{% extends "admin/change_form.html" %}

{% block extrahead %}
  {{ block.super }}
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function() {
      console.log('PAGE LOADED - Initializing map picker');
      
      var wrappers = document.querySelectorAll('[data-map-picker]');
      console.log('Found ' + wrappers.length + ' map pickers');
      
      wrappers.forEach(function(wrapper) {
        initMapPicker(wrapper);
      });
    });
    
    var mapsCache = {}; // Cache maps by wrapper ID
    
    function initMapPicker(wrapper) {
      var mapElement = wrapper.querySelector('.tm-map-picker__map');
      if (!mapElement) {
        console.log('Map element not found');
        return;
      }
      
      mapElement.innerHTML = '<div style="padding: 20px; background: #f0f0f0; color: #333;">Loading Google Maps...</div>';
      
      var apiKey = wrapper.getAttribute('data-google-api-key');
      if (!apiKey) {
        mapElement.innerHTML = '<div style="padding: 20px; color: red;">Error: API key not found</div>';
        return;
      }
      
      console.log('Starting Google Maps initialization');
      loadGoogleMaps(mapElement, apiKey, wrapper);
    }
    
    function loadGoogleMaps(mapElement, apiKey, wrapper) {
      if (window.google && window.google.maps) {
        console.log('Google Maps already loaded');
        initializeMapElement(mapElement, window.google.maps, wrapper);
        return;
      }
      
      var callbackName = 'gmapsCallback' + Date.now();
      window[callbackName] = function() {
        console.log('Google Maps loaded via callback');
        delete window[callbackName];
        initializeMapElement(mapElement, window.google.maps, wrapper);
      };
      
      var script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&libraries=places&callback=' + callbackName;
      script.async = true;
      
      script.onerror = function() {
        console.error('Failed to load Google Maps');
        mapElement.innerHTML = '<div style="padding: 20px; color: red;">Failed to load Google Maps</div>';
      };
      
      console.log('Appending Google Maps script');
      document.head.appendChild(script);
    }
    
    function initializeMapElement(mapElement, maps, wrapper) {
      try {
        console.log('Creating map');
        mapElement.innerHTML = '';
        
        var map = new maps.Map(mapElement, {
          center: { lat: 28.3949, lng: 84.1240 },
          zoom: 7,
          scrollwheel: true,
          zoomControl: true,
          mapTypeControl: true,
          streetViewControl: false,
          fullscreenControl: true,
        });
        
        console.log('Map created successfully!');
        
        var marker = null;
        var inputId = wrapper.getAttribute('data-input-id');
        var inputElement = document.getElementById(inputId);
        var wrapId = inputId + '_wrapper';
        var geocoder = new maps.Geocoder();
        var placesService = null;
        if (maps.places && maps.places.PlacesService) {
          placesService = new maps.places.PlacesService(map);
        }
        // expose search input early so click handler can write to it immediately
        var searchInput = wrapper.querySelector('[data-search-input]');
        var destinationsStr = wrapper.getAttribute('data-destinations');
        var destinations = [];
        try {
          destinations = JSON.parse(destinationsStr);
        } catch(e) {
          console.error('Failed to parse destinations:', e);
        }
        mapsCache[wrapId] = { map: map, maps: maps, marker: marker, wrapper: wrapper };

        function normalizeText(value) {
          return (value || '').toLowerCase().trim();
        }

        function findExistingDestination(label) {
          var normalizedLabel = normalizeText(label);
          return destinations.find(function(dest) {
            return normalizeText(dest.name) === normalizedLabel ||
                   normalizeText(dest.name + ' ' + (dest.province || '')) === normalizedLabel;
          });
        }

        function createAndSelectDestination(lat, lng, label, province) {
          var createUrl = wrapper.getAttribute('data-create-pin-url');
          var csrfInput = document.querySelector('input[name="csrfmiddlewaretoken"]');

          if (!createUrl || !csrfInput) {
            return;
          }

          fetch(createUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': csrfInput.value,
            },
            body: JSON.stringify({
              latitude: lat,
              longitude: lng,
              name: label,
              province: province || '',
            }),
          })
            .then(function(response) {
              if (!response.ok) {
                throw new Error('Failed to create destination');
              }
              return response.json();
            })
            .then(function(dest) {
              destinations.push(dest);
              try {
                selectDestination(wrapId, dest, mapsCache, map, maps);
              } catch (e) {
                console.error('selectDestination failed, applying fallback UI update', e, dest);
              }
              // Ensure form input and displayed label are updated even if selectDestination misses
              try {
                var inputIdLocal = wrapper.getAttribute('data-input-id');
                var inputElLocal = document.getElementById(inputIdLocal);
                if (inputElLocal) {
                  inputElLocal.value = dest.id;
                  inputElLocal.dispatchEvent(new Event('change', { bubbles: true }));
                  inputElLocal.dispatchEvent(new Event('input', { bubbles: true }));
                }
                var displayEl = wrapper.querySelector('[data-selected-name]');
                if (displayEl) {
                  displayEl.textContent = dest.name + ' (' + (dest.province || 'N/A') + ')';
                }
              } catch (uiErr) {
                console.error('Fallback UI update failed', uiErr);
              }
            })
            .catch(function(error) {
              console.error('Error creating destination:', error);
            });
        }

        function handleLocationSelection(latLng, label, province) {
          var destination = findExistingDestination(label);
          if (destination) {
            selectDestination(wrapId, destination, mapsCache, map, maps);
            if (inputElement) {
              inputElement.value = destination.id;
            }
            return;
          }

          createAndSelectDestination(latLng.lat(), latLng.lng(), label, province);
        }
        
        // Add click listener to place markers
        map.addListener('click', function(event) {
          console.log('Map clicked at', event.latLng.lat(), event.latLng.lng());
          
          var cached = mapsCache[wrapId];
          if (cached.marker) {
            cached.marker.setMap(null);
          }
          
          cached.marker = new maps.Marker({
            position: event.latLng,
            map: map,
            title: 'Selected Location',
          });

          if (placesService) {
            placesService.nearbySearch({
              location: event.latLng,
              radius: 500,
            }, function(results, status) {
              var labelFallback = 'Pinned location ' + event.latLng.lat().toFixed(5) + ',' + event.latLng.lng().toFixed(5);
              if (status === maps.places.PlacesServiceStatus.OK && results && results.length) {
                var place = results[0];
                if (place && place.place_id && placesService.getDetails) {
                  placesService.getDetails({ placeId: place.place_id, fields: ['name','formatted_address','address_components','geometry'] }, function(detail, ds) {
                    var labelName = (detail && detail.name) || (place && place.name) || null;
                    var province = '';
                    if (detail && detail.address_components) {
                      for (var i = 0; i < detail.address_components.length; i++) {
                        var comp = detail.address_components[i];
                        if (comp.types && comp.types.indexOf('administrative_area_level_1') !== -1) {
                          province = comp.long_name;
                          break;
                        }
                      }
                    }
                    if (labelName) {
                      if (searchInput) searchInput.value = labelName;
                      handleLocationSelection(event.latLng, labelName, province);
                      return;
                    }
                    // otherwise fall through to geocoder fallback below
                    geocoder.geocode({ location: event.latLng }, function(results2, status2) {
                      var label = labelFallback;
                      if (status2 === 'OK' && results2 && results2[0]) {
                        label = results2[0].formatted_address || label;
                      }
                      if (searchInput) searchInput.value = label;
                      handleLocationSelection(event.latLng, label);
                    });
                  });
                  return;
                } else {
                  var name = place && place.name;
                  if (name) {
                    if (searchInput) searchInput.value = name;
                    handleLocationSelection(event.latLng, name);
                    return;
                  }
                }
              }
              // fallback to geocoder if no POI name or details
              geocoder.geocode({ location: event.latLng }, function(results2, status2) {
                var label = labelFallback;
                if (status2 === 'OK' && results2 && results2[0]) {
                  label = results2[0].formatted_address || label;
                }
                if (searchInput) searchInput.value = label;
                handleLocationSelection(event.latLng, label);
              });
            });
          } else {
            geocoder.geocode({ location: event.latLng }, function(results, status) {
              var label = 'Pinned location ' + event.latLng.lat().toFixed(5) + ',' + event.latLng.lng().toFixed(5);
              if (status === 'OK' && results && results[0]) {
                label = results[0].formatted_address || label;
              }
              if (searchInput) {
                searchInput.value = label;
              }
              handleLocationSelection(event.latLng, label);
            });
          }
        });
        
        // Add search functionality
        if (searchInput && maps.places && maps.places.Autocomplete) {
          var autocomplete = new maps.places.Autocomplete(searchInput, {
            fields: ['geometry', 'name', 'formatted_address'],
          });

          autocomplete.addListener('place_changed', function() {
            var place = autocomplete.getPlace();
            if (!place || !place.geometry || !place.geometry.location) {
              return;
            }

            var label = place.name || place.formatted_address || searchInput.value;
            searchInput.value = label;
            handleLocationSelection(place.geometry.location, label);
          });
        }
        
      } catch(e) {
        console.error('Error creating map:', e);
        mapElement.innerHTML = '<div style="padding: 20px; color: red;">Error: ' + e.message + '</div>';
      }
    }
    
    function selectDestination(wrapId, dest, mapsCache, map, maps) {
      console.log('Selecting destination:', dest);
      
      if (!mapsCache[wrapId]) {
        console.error('Map cache not found');
        return;
      }
      
      var cached = mapsCache[wrapId];
      var location = { lat: parseFloat(dest.latitude), lng: parseFloat(dest.longitude) };
      
      cached.map.setCenter(location);
      cached.map.setZoom(12);
      
      if (cached.marker) {
        cached.marker.setMap(null);
      }
      
      cached.marker = new cached.maps.Marker({
        position: location,
        map: cached.map,
        title: dest.name,
      });
      
      // Update form field
      var inputId = cached.wrapper.getAttribute('data-input-id');
      console.log('Setting input value for:', inputId, 'to:', dest.id);
      var inputElement = document.getElementById(inputId);
      if (inputElement) {
        inputElement.value = dest.id;
        // Trigger change event for Django form validation
        inputElement.dispatchEvent(new Event('change', { bubbles: true }));
        inputElement.dispatchEvent(new Event('input', { bubbles: true }));
        console.log('Input value set to:', inputElement.value);
      } else {
        console.error('Input element not found with id:', inputId);
      }
      
      // Update display
      var coordDisplay = cached.wrapper.querySelector('[data-selected-name]');
      if (coordDisplay) {
        coordDisplay.textContent = dest.name + ' (' + (dest.province || 'N/A') + ')';
      }
    }
  </script>
{% endblock %}
