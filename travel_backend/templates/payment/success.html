<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Payment Success</title>
</head>
<body>
  <div style="max-width:700px;margin:48px auto;font-family:Arial,Helvetica,sans-serif">
    <h1>Payment Successful</h1>
    <p id="message">Verifying payment...</p>
    <pre id="result" style="background:#f6f8fa;padding:12px;border-radius:6px;overflow:auto"></pre>
    <p><a href="/">Back to home</a></p>
  </div>

  <script>
    async function verify() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const bookingId = params.get('booking_id');
      if (!sessionId) {
        document.getElementById('message').textContent = 'No session_id found in URL.';
        return;
      }

      try {
        const resp = await fetch('/api/payments/verify/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });

        const data = await resp.json();
        document.getElementById('message').textContent = resp.ok ? 'Payment verified.' : 'Verification failed.';
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('message').textContent = 'Network error while verifying payment.';
        document.getElementById('result').textContent = String(e);
      }
    }

    verify();
  </script>
</body>
</html>
